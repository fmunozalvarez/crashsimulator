name: CI Gates

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hermetic-gates:
    name: Release gates (hermetic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax (all tracked scripts)
        run: git ls-files -z '*.sh' 'CrashSimulatorV2.sh' | xargs -0 -n1 bash -n

      - name: Build drift (lib/*.sh -> CrashSimulatorV2.sh)
        run: bash build.sh --check

      - name: ShellCheck (lib sources + tools)
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # Informative on the assembled monolith and helper tools; the lib/*.sh
          # fragments are checked as a set so cross-fragment references resolve.
          shellcheck -S warning -x lib/*.sh || true
          shellcheck -S error tools/*.sh

      - name: Secret gate (fail on high or warnings)
        run: bash tools/crashsim_release_secret_gate.sh --fail-on-warnings

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Unit tests (bats - pure lib/*.sh helpers)
        run: bats tests/bats/
